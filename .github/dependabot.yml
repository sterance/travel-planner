version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"

  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "daily"
    ignore:
      - dependency-name: "eslint"
        versions: [">= 10.0.0"]
      - dependency-name: "eslint-plugin-react-hooks"
        versions: [">= 6.0.0"]
